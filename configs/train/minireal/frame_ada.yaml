dataset: "minireal"
sequence_interval: 1
val_start_frame_interval: 16
cam_ids: [0]
accumulate_action: False
pre_encode : False
normalize: True
mode: 'train'

anno: 'minireal_train'
# False = 全量 train/val；True = 仅 val 前 10 条冒烟（见 Mymodify.md）
debug: False
do_evaluate: False
final_frame_ada: False

# 相对 robotdata/opensource_robotdata；由 update_paths() 拼到 dataset_dir（Bridge frame_ada 初始化）
evaluate_checkpoint: "bridge/checkpoints/frame_ada/0300000.pt"

model: IRASim-XL/2
num_frames: 16
video_size: [256,320]
learn_sigma: False
extras: 3
mask_frame_num: 1

learning_rate: 1e-4
ckpt_every: 5000
clip_max_norm: 0.1
start_clip_iter: 0
local_batch_size: 1
local_val_batch_size: 1
max_train_steps: 50000
global_seed: 3407
num_workers: 4
log_every: 50
val_every: 1000
# Effective global batch ≈ local_batch_size * nproc * gradient_accumulation_steps (8 GPUs: 1*8*1 = 8)
gradient_accumulation_steps: 1
attention_mode: 'math'

resume_from_checkpoint : False
