dataset: "minireal"
sequence_interval: 1
val_start_frame_interval: 16
cam_ids: [0]
accumulate_action: False
pre_encode : False
normalize: True
mode: 'test'

anno: 'minireal_rollout'
debug: True
do_evaluate: True
final_frame_ada: False

# After training, point to under robotdata/opensource_robotdata/
evaluate_checkpoint: 'minireal/checkpoints/frame_ada/0050000.pt'

model: IRASim-XL/2
num_frames: 16
video_size: [256,320]
learn_sigma: False
extras: 3
mask_frame_num: 1

learning_rate: 1e-4
ckpt_every: 10000
clip_max_norm: 0.1
start_clip_iter: 0
local_batch_size: 1
local_val_batch_size: 1
max_train_steps: 50000
global_seed: 3407
num_workers: 2
log_every: 100
val_every: 10000
gradient_accumulation_steps: 1
attention_mode: 'math'

resume_from_checkpoint : False
